<!DOCTYPE html>
<html>
<head>
    <script src='https://aframe.io/releases/1.7.0/aframe.min.js'></script>
    <script src='https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.4/dist/aframe-physics-system.min.js'></script>
</head>
<body>
    <a-scene>
        <a-camera position="0 3 6">
        </a-camera>
        <a-sky color="#ffe9ab">
        </a-sky>


        <a-plane static-body position="0 0 0" rotation="-90 0 0" width="16" height="35" color="#cfbd8c">
        </a-plane>


        <a-cylinder static-body position="-3 2 -2" radius="0.2" height="4" color="#FF5722">
        </a-cylinder>
        <a-cylinder static-body position="-1 2 -2" radius="0.2" height="4" color="#FF5722">
        </a-cylinder>
        <a-cylinder static-body position="1 2 -2" radius="0.2" height="4" color="#FF5722">
        </a-cylinder>
        <a-cylinder static-body position="3 2 -2" radius="0.2" height="4" color="#FF5722">
        </a-cylinder>


        <a-box static-body position="-2 1 -2" width="1.8" height="2" depth="0.2" color="#FFC107"
               animation="property: position; to: -2 3 -2; dir: alternate; dur: 2000; easing: linear; loop:true">
        </a-box>
        <a-box static-body position="0 2 -2" width="1.8" height="2" depth="0.2" color="#FFC107"
               animation="property: position; to: 0 0 -2; dir: alternate; dur: 1500; easing: linear; loop:true">
        </a-box>
        <a-box static-body position="2 1 -2" width="1.8" height="2" depth="0.2" color="#FFC107"
               animation="property: position; to: 2 3 -2; dir: alternate; dur: 2500; easing: linear; loop:true">
        </a-box>


        <a-box static-body position="0 1 -7" width="8" height="0.2" depth="4" color="#E91E63"
               animation="property: rotation; to: 0 0 15; dir: alternate; dur: 3000; easing: linear; loop:true">
        </a-box>


        <a-entity position='0 2 0'
                  animation='property: rotation; to: 0 0 360; dur: 6000; easing: linear; loop: true'>
            <a-cylinder static-body position="0 0 0" radius="0.1" height="3" color="#9C27B0">
            </a-cylinder>

            <a-box static-body position="0 -1.5 0" width="0.4" height="0.4" depth="0.4" color="#00BCD4">
            </a-box>

            <a-box static-body position="0 1.5 0" width="0.4" height="0.4" depth="0.4" color="#00BCD4">
            </a-box>
        </a-entity>

        <a-entity position='0 2 3'
                  animation='property: rotation; to: 0 0 360; dur: 6000; easing: linear; loop: true'>
            <a-cylinder static-body position="0 0 0" radius="0.1" height="3" color="#9C27B0">
            </a-cylinder>

            <a-box static-body position="0 -1.5 0" width="0.4" height="0.4" depth="0.4" color="#00BCD4">
            </a-box>

            <a-box static-body position="0 1.5 0" width="0.4" height="0.4" depth="0.4" color="#00BCD4">
            </a-box>
        </a-entity>


        <a-sphere dynamic-body='mass: 1'
                  position='0 4 -7'
                  radius='0.4'
                  color='#EF476F'>
        </a-sphere>



    </a-scene>
</body>
</html>
